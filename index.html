<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Mystic Beauty — Naturalne odmładzanie i piękno</title>
  <meta
    name="description"
    content="Mystic Beauty — naturalne odmładzanie, subtelne efekty, bezpieczne procedury i indywidualna konsultacja."
  />

  <link rel="stylesheet" href="style.css" />
</head>

<body data-page="home">
  <main class="home-page">
    <section class="owner-hero">
      <div class="owner-photo-wrap">
        <img
          id="ownerPhoto"
          class="owner-photo"
          src="assets/owner.jpg"
          alt="Właścicielka Mystic Beauty"
        />
      </div>

      <div class="owner-content">
        <p class="section-label" id="ownerKicker">Mystic Beauty</p>

        <h1 id="ownerTitle">
          Naturalne piękno zaczyna się od zaufania.
        </h1>

        <p class="owner-lead" id="ownerLead">
          Subtelne zabiegi, indywidualne podejście i spokojna estetyka dla osób, które chcą wyglądać świeżo, naturalnie i harmonijnie.
        </p>

        <div class="owner-bio-card">
          <p id="ownerBio">
            Tu pojawi się opis właścicielki salonu.
          </p>
        </div>

        <div class="owner-actions">
          <a class="btn btn-primary" href="oferta/">
            Zarezerwuj zabieg
          </a>

          <a class="btn btn-secondary" href="oferta/#services">
            Zobacz ofertę
          </a>
        </div>
      </div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
